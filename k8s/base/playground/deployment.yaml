apiVersion: apps/v1
kind: Deployment
metadata:
  name: playground
  namespace: smp-agents
  labels:
    app.kubernetes.io/name: playground
    app.kubernetes.io/component: agent
    kagenti.io/type: agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: playground
      kagenti.io/type: agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: playground
        kagenti.io/type: agent
    spec:
      containers:
        - name: agent
          image: ghcr.io/rrbanda/smp-agents/playground:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: PORT
              value: "8000"
            - name: HOST
              value: "0.0.0.0"
            - name: LLAMASTACK_API_KEY
              value: "not-needed"
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smp-secrets
                  key: NEO4J_PASSWORD
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector.kagenti-system.svc.cluster.local:8335"
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: smp-config
