name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ruff mypy
          pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy
        run: mypy shared/ agents/ --ignore-missing-imports

  unit-tests:
    name: Unit Tests
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/ -m unit -v --tb=short --junitxml=test-results/unit.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: test-results/unit.xml

  agent-evals:
    name: ADK Agent Evaluations
    needs: unit-tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    continue-on-error: true
    timeout-minutes: 30
    env:
      NEO4J_URI: ${{ secrets.NEO4J_URI }}
      NEO4J_PASSWORD: ${{ secrets.NEO4J_PASSWORD }}
      LLM_API_BASE: ${{ secrets.LLM_API_BASE }}
      LLM_MODEL_ID: ${{ secrets.LLM_MODEL_ID }}
      EMBEDDING_API_BASE: ${{ secrets.EMBEDDING_API_BASE }}
      LLAMASTACK_API_KEY: ${{ secrets.LLAMASTACK_API_KEY }}
    steps:
      - name: Check required secrets
        run: |
          if [ -z "$LLM_MODEL_ID" ] || [ -z "$LLM_API_BASE" ]; then
            echo "::warning::Skipping agent evals — LLM_MODEL_ID or LLM_API_BASE secrets not configured."
            echo "SKIP_EVALS=true" >> "$GITHUB_ENV"
          fi

      - uses: actions/checkout@v4
        if: env.SKIP_EVALS != 'true'

      - uses: actions/setup-python@v5
        if: env.SKIP_EVALS != 'true'
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: env.SKIP_EVALS != 'true'
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run ADK evals
        if: env.SKIP_EVALS != 'true'
        run: pytest tests/test_agent_evals.py -m eval -v --tb=long --junitxml=test-results/evals.xml
        timeout-minutes: 20

      - name: Upload eval results
        if: always() && env.SKIP_EVALS != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: test-results/evals.xml

  container-build:
    name: Build Container (${{ matrix.agent }})
    needs: unit-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - agent: skill-advisor
            dockerfile: Dockerfile.skill-advisor
          - agent: bundle-validator
            dockerfile: Dockerfile.bundle-validator
          - agent: kg-qa
            dockerfile: Dockerfile.kg-qa
          - agent: playground
            dockerfile: Dockerfile.playground
          - agent: skill-builder
            dockerfile: Dockerfile.skill-builder
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.agent }}:sha-${{ github.sha }}
            ghcr.io/${{ github.repository }}/${{ matrix.agent }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
